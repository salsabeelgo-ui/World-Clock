<!DOCTYPE html>
<html>
<head>
  <title>InEight Global Time Dashboard</title>
 
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: #fff;
 
      /* Construction / blueprint style */
      background:
        linear-gradient(rgba(20,20,20,0.9), rgba(20,20,20,0.9)),
        repeating-linear-gradient(
          0deg,
          #1c1c1c,
          #1c1c1c 20px,
          #222 20px,
          #222 40px
        );
    }
 
    header {
      text-align: center;
      padding: 20px;
      border-bottom: 3px solid #ff9800;
    }
 
    .logo {
      width: 140px;
      margin-bottom: 10px;
    }
 
    h1 {
      margin: 5px;
      font-size: 26px;
      color: #ff9800;
      letter-spacing: 1px;
    }
 
    .subtitle {
      font-size: 12px;
      color: #aaa;
    }
 
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
      padding: 20px;
      max-width: 1000px;
      margin: auto;
    }
 
    .card {
      background: rgba(30, 30, 30, 0.95);
      border-left: 5px solid #ff9800;
      padding: 20px;
      border-radius: 6px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
      transition: 0.3s;
    }
 
    .card:hover {
      transform: scale(1.03);
      box-shadow: 0 0 20px rgba(255,152,0,0.4);
    }
 
    .title {
      font-size: 16px;
      font-weight: bold;
      color: #ffcc80;
    }
 
    .time {
      font-size: 22px;
      margin-top: 10px;
      font-weight: bold;
      color: #ffffff;
    }
 
    .tag {
      font-size: 11px;
      color: #999;
      margin-top: 5px;
    }
  </style>
</head>
 
<body>
 
<header>
  <!-- Replace with real InEight logo -->
  <img class="logo" src="https://upload.wikimedia.org/wikipedia/commons/8/89/Logo_placeholder.png">
 
  <h1>🏗 InEight Global Time Control</h1>
  <div class="subtitle">Construction Project Coordination Dashboard</div>
</header>
 
<div class="container">
 
  <div class="card">
    <div class="title">Australia – Sydney</div>
    <div class="time" id="aus"></div>
    <div class="tag">Project Region A</div>
  </div>
 
  <div class="card">
    <div class="title">USA – New York</div>
    <div class="time" id="usa"></div>
    <div class="tag">HQ Operations</div>
  </div>
 
  <div class="card">
    <div class="title">Sri Lanka – Colombo</div>
    <div class="time" id="sl"></div>
    <div class="tag">Support Center</div>
  </div>
 
  <div class="card">
    <div class="title">UK – London</div>
    <div class="time" id="uk"></div>
    <div class="tag">EU Projects</div>
  </div>
 
  <div class="card">
    <div class="title">Canada – Toronto</div>
    <div class="time" id="ca"></div>
    <div class="tag">North Region Ops</div>
  </div>
 
</div>
 
<script>
function updateTime() {
  document.getElementById("aus").innerHTML =
    new Date().toLocaleString("en-US",{timeZone:"Australia/Sydney", hour: '2-digit', minute:'2-digit', second:'2-digit'});
 
  document.getElementById("usa").innerHTML =
    new Date().toLocaleString("en-US",{timeZone:"America/New_York", hour: '2-digit', minute:'2-digit', second:'2-digit'});
 
  document.getElementById("sl").innerHTML =
    new Date().toLocaleString("en-US",{timeZone:"Asia/Colombo", hour: '2-digit', minute:'2-digit', second:'2-digit'});
 
  document.getElementById("uk").innerHTML =
    new Date().toLocaleString("en-US",{timeZone:"Europe/London", hour: '2-digit', minute:'2-digit', second:'2-digit'});
 
  document.getElementById("ca").innerHTML =
    new Date().toLocaleString("en-US",{timeZone:"America/Toronto", hour: '2-digit', minute:'2-digit', second:'2-digit'});
}
 
setInterval(updateTime, 1000);
updateTime();
</script>
 
</body>
</html>
